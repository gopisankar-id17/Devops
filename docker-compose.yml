services:

  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - monitoring

  app:
    build: .
    ports:
      - "80:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/tododb
    restart: always
    depends_on:
      - mongo
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    restart: always
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  mongo-data:
  grafana-data:
