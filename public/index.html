<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.15);
            margin-top: 1rem;
            border-radius: 12px;
            padding: 0.8rem;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        .body {
            padding: 1.5rem;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
            color: #333;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }

        input::placeholder { color: #bbb; }

        .add-btn {
            padding: 14px 22px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 1.2rem;
        }

        .tab {
            padding: 6px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 20px;
            background: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            color: #888;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
            font-weight: 600;
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #f8f9ff;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: 0.3s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-item:hover {
            border-color: #667eea;
            background: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.1);
        }

        .todo-item.completed {
            background: #f0fdf4;
            border-color: #86efac;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #ddd;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            flex-shrink: 0;
            background: white;
        }

        .checkbox.checked {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
            font-size: 12px;
        }

        .todo-text {
            flex: 1;
            font-size: 0.95rem;
            color: #333;
            cursor: pointer;
            transition: 0.3s;
        }

        .todo-text.completed {
            text-decoration: line-through;
            color: #aaa;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .delete-btn:hover {
            color: #ef4444;
            background: #fee2e2;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #bbb;
        }

        .empty-state .emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        .footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer span {
            font-size: 0.85rem;
            color: #aaa;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .clear-btn:hover { background: #fee2e2; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #667eea; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✅ My Todos</h1>
            <p>Stay organized, stay productive</p>
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="activeCount">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="doneCount">0</div>
                    <div class="stat-label">Done</div>
                </div>
            </div>
        </div>

        <div class="body">
            <div class="input-area">
                <input type="text" id="todoInput" placeholder="What needs to be done?" />
                <button class="add-btn" onclick="addTodo()">+ Add</button>
            </div>

            <div class="filter-tabs">
                <button class="tab active" onclick="setFilter('all', this)">All</button>
                <button class="tab" onclick="setFilter('active', this)">Active</button>
                <button class="tab" onclick="setFilter('completed', this)">Completed</button>
            </div>

            <div class="todo-list" id="todoList"></div>
        </div>

        <div class="footer">
            <span id="footerText">0 items left</span>
            <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
        </div>
    </div>

    <script>
        let filter = 'all';

        async function loadTodos() {
            const res = await fetch('/todos');
            const todos = await res.json();
            renderTodos(todos);
            updateStats(todos);
        }

        async function addTodo() {
            const input = document.getElementById('todoInput');
            if (!input.value.trim()) return;
            await fetch('/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: input.value })
            });
            input.value = '';
            loadTodos();
        }

        async function deleteTodo(id) {
            await fetch(`/todos/${id}`, { method: 'DELETE' });
            loadTodos();
        }

        async function toggleTodo(id) {
            await fetch(`/todos/${id}`, { method: 'PATCH' });
            loadTodos();
        }

        async function clearCompleted() {
            const res = await fetch('/todos');
            const todos = await res.json();
            const completed = todos.filter(t => t.completed);
            await Promise.all(completed.map(t => fetch(`/todos/${t.id}`, { method: 'DELETE' })));
            loadTodos();
        }

        function setFilter(f, btn) {
            filter = f;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            loadTodos();
        }

        function updateStats(todos) {
            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const active = total - done;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('doneCount').textContent = done;
            document.getElementById('footerText').textContent = `${active} item${active !== 1 ? 's' : ''} left`;
        }

        function renderTodos(todos) {
            const list = document.getElementById('todoList');
            let filtered = todos;
            if (filter === 'active') filtered = todos.filter(t => !t.completed);
            if (filter === 'completed') filtered = todos.filter(t => t.completed);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">${filter === 'completed' ? '🎯' : '📝'}</div>
                        <p>${filter === 'completed' ? 'No completed tasks yet!' : 'No tasks here! Add one above.'}</p>
                    </div>`;
                return;
            }

            list.innerHTML = filtered.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <div class="checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo(${todo.id})">
                        ${todo.completed ? '✓' : ''}
                    </div>
                    <span class="todo-text ${todo.completed ? 'completed' : ''}" onclick="toggleTodo(${todo.id})">
                        ${todo.text}
                    </span>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})">✕</button>
                </div>
            `).join('');
        }

        document.getElementById('todoInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') addTodo();
        });

        loadTodos();
    </script>
</body>
</html>
